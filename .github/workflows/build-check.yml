# File: .github/workflows/build-check.yml
#
# Purpose: Compile-only CI on GitHub's free Ubuntu runners.
#          No GPU is available — this only verifies the code compiles.
#          Actual execution must be done on Nautilus (see instructions).
#
# Result visible in: your repo -> Actions tab
#   Green check  = code compiles cleanly
#   Red X        = compilation error; read the log

name: Build Check (compile only)

on:
  push:
    branches: ["**"]

jobs:
  build:
    name: nvcc compile check
    # Change from ubuntu-latest to ubuntu-22.04
    runs-on: ubuntu-22.04 
    timeout-minutes: 10
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install CUDA toolkit
      uses: Jimver/cuda-toolkit@v0.2.35
      with:
        cuda: '12.2.0'
        method: network
        # Optional: strictly pull nvcc to save time
        sub-packages: '["nvcc", "cudart-dev"]' 

    - name: Verify nvcc
      run: |
        export PATH=/usr/local/cuda-12.2/bin${PATH:+:${PATH}}
        nvcc --version
    - name: Compile cuda_hello
      run: |
        nvcc -arch=sm_70 -O2 -o /tmp/cuda_hello cuda_hello.cu
        echo "cuda_hello compiled OK"

    - name: Summary
      run: |
        echo "Build succeeded. To run on a real GPU, use a Nautilus pod."
        echo "See docs/student-instructions.md for step-by-step instructions."
